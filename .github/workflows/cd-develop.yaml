name: wf-cd-develop
on:
  push:
    branches:
      - develop
jobs:
  build-develop-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository on the Runner
        uses: actions/checkout@v4
      - name: Build Website With Parcel
        run: npx parcel build "./src/index.html" --dist-dir "./dist" --public-url "./"
      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"
          name: "build-artifact-develop"
  deploy-develop-job:
    needs: "build-develop-job"
    runs-on: ubuntu-latest
    environment:
      name: "develop-env"
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy Build Artifacts On GH-Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: "build-artifact-develop"
          token: "${{github.token}}"