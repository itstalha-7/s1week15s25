name: wf-ci-develop
on:
  pull_request:
    branches:
      - develop 
    types:
      - opened
      - synchronize
jobs:
  lint-develop-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository On the Runner
        uses: actions/checkout@v4
      - name: Lint HTML Files With HTMLHint
        run: npx htmlhint "**/*.html"
      - name: Lint CSS Files With Stylelint
        run: npx stylelint "**/*.css"
      - name: Build Website With Parcel
        run: npx parcel build "./src/index.html" --dist-dir "./dist"
    